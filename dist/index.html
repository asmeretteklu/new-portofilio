    <script>
      // ── GLOBAL ANIMATIONS ──
      // Fade up on scroll
      const fadeObserver = new IntersectionObserver(entries => {
        entries.forEach((e, i) => {
          if (e.isIntersecting) {
            setTimeout(() => e.target.classList.add("visible"), i * 80);
          }
        });
      }, { threshold: 0.1 });
      
      // Delay observation until React renders
      setTimeout(() => {
        const fadeEls = document.querySelectorAll(".fade-up, .fact-card");
        fadeEls.forEach(el => fadeObserver.observe(el));
      }, 1000);

      // Count-up stats
      const statObserver = new IntersectionObserver(entries => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            document.querySelectorAll("[data-target]").forEach(el => {
              const target = parseInt(el.dataset.target);
              let count = 0;
              const step = target / 60;
              const timer = setInterval(() => {
                count += step;
                if (count >= target) { el.textContent = target; clearInterval(timer); return; }
                el.textContent = Math.floor(count);
              }, 20);
            });
            statObserver.disconnect();
          }
        });
      }, { threshold: 0.5 });
      
      setTimeout(() => {
        const statsSection = document.querySelector(".stats-bar, [class*='stat']");
        if (statsSection) statObserver.observe(statsSection);
      }, 1000);

      // Removed custom cursor
    </script>
